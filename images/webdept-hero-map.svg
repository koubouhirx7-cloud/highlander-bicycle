<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" role="img" aria-labelledby="title desc">
  <title id="title">HighLander WEB Department visual system map</title>
  <desc id="desc">A warm editorial dashboard collage showing a website, booking form, LINE card, order card, customer card, AI notes, and a small bicycle shop origin mark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f2e8"/>
      <stop offset="1" stop-color="#e6efe8"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edf5ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#1b3022" flood-opacity=".16"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1b3022" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="920" height="640" rx="34" fill="url(#bg)"/>
  <path d="M78 488 C194 370 250 516 366 414 C481 312 532 430 650 314 C745 220 813 272 875 196" fill="none" stroke="#8c7051" stroke-width="3" stroke-linecap="round" opacity=".22"/>
  <path d="M74 530 C198 432 292 540 398 456 C516 360 564 450 708 374 C793 329 833 318 876 272" fill="none" stroke="#1b3022" stroke-width="2" stroke-linecap="round" opacity=".16"/>

  <g transform="translate(260 108)" filter="url(#shadow)">
    <rect width="420" height="296" rx="20" fill="url(#screen)" stroke="#d8ded5"/>
    <rect x="0" y="0" width="420" height="48" rx="20" fill="#1b3022"/>
    <circle cx="28" cy="24" r="6" fill="#f3d36b"/>
    <circle cx="50" cy="24" r="6" fill="#d9c7aa"/>
    <circle cx="72" cy="24" r="6" fill="#8fb297"/>
    <text x="112" y="30" font-family="Outfit, Arial, sans-serif" font-size="14" letter-spacing="3" fill="#f6f5f0">WEBSITE</text>
    <rect x="32" y="78" width="164" height="34" rx="9" fill="#1b3022" opacity=".92"/>
    <rect x="32" y="128" width="222" height="12" rx="6" fill="#a9b8ac"/>
    <rect x="32" y="152" width="180" height="12" rx="6" fill="#c8d0ca"/>
    <rect x="32" y="176" width="128" height="12" rx="6" fill="#d7ddd8"/>
    <rect x="292" y="80" width="80" height="80" rx="18" fill="#e8c86a"/>
    <path d="M310 122 h44 M332 100 v44" stroke="#1b3022" stroke-width="6" stroke-linecap="round"/>
    <rect x="32" y="224" width="96" height="32" rx="16" fill="#8c7051"/>
    <rect x="146" y="224" width="118" height="32" rx="16" fill="#ffffff" stroke="#1b3022"/>
  </g>

  <g transform="translate(80 130)" filter="url(#soft)">
    <rect width="190" height="132" rx="18" fill="#ffffff" stroke="#e0dbd0"/>
    <rect x="22" y="22" width="56" height="56" rx="16" fill="#e6efe8"/>
    <path d="M39 55 h24 M51 43 v24" stroke="#1b3022" stroke-width="5" stroke-linecap="round"/>
    <text x="92" y="42" font-family="Outfit, Arial, sans-serif" font-size="13" font-weight="700" fill="#1b3022">HOME PAGE</text>
    <rect x="92" y="58" width="64" height="8" rx="4" fill="#cbd5cc"/>
    <rect x="22" y="96" width="132" height="10" rx="5" fill="#d9c7aa"/>
  </g>

  <g transform="translate(688 146)" filter="url(#soft)">
    <rect width="170" height="152" rx="18" fill="#ffffff" stroke="#e0dbd0"/>
    <text x="22" y="36" font-family="Outfit, Arial, sans-serif" font-size="13" font-weight="700" fill="#1b3022">BOOKING</text>
    <rect x="22" y="56" width="126" height="16" rx="8" fill="#e6efe8"/>
    <rect x="22" y="84" width="52" height="34" rx="9" fill="#1b3022" opacity=".9"/>
    <rect x="86" y="84" width="52" height="34" rx="9" fill="#d9c7aa"/>
    <rect x="22" y="128" width="116" height="8" rx="4" fill="#cbd5cc"/>
  </g>

  <g transform="translate(92 324)" filter="url(#soft)">
    <rect width="204" height="160" rx="20" fill="#1b3022"/>
    <text x="22" y="36" font-family="Outfit, Arial, sans-serif" font-size="13" font-weight="700" fill="#f6f5f0">LINE / CHAT</text>
    <rect x="22" y="58" width="116" height="26" rx="13" fill="#ffffff" opacity=".95"/>
    <rect x="66" y="98" width="116" height="26" rx="13" fill="#8fb297"/>
    <circle cx="34" cy="124" r="12" fill="#f3d36b"/>
  </g>

  <g transform="translate(626 360)" filter="url(#soft)">
    <rect width="210" height="148" rx="20" fill="#ffffff" stroke="#e0dbd0"/>
    <text x="22" y="36" font-family="Outfit, Arial, sans-serif" font-size="13" font-weight="700" fill="#1b3022">ORDER / TASK</text>
    <rect x="22" y="58" width="152" height="12" rx="6" fill="#cbd5cc"/>
    <rect x="22" y="86" width="112" height="12" rx="6" fill="#d9c7aa"/>
    <rect x="22" y="114" width="138" height="12" rx="6" fill="#e6efe8"/>
    <circle cx="176" cy="92" r="22" fill="#1b3022"/>
    <path d="M166 92 l7 7 l16 -18" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(386 428)" filter="url(#soft)">
    <rect width="184" height="126" rx="18" fill="#fffaf0" stroke="#e4d8c5"/>
    <text x="22" y="34" font-family="Outfit, Arial, sans-serif" font-size="13" font-weight="700" fill="#8c7051">AI NOTE</text>
    <path d="M26 58 h88 M26 80 h132 M26 102 h96" stroke="#b8aa94" stroke-width="8" stroke-linecap="round"/>
    <circle cx="150" cy="34" r="9" fill="#e8c86a"/>
  </g>

  <g transform="translate(404 292)">
    <circle cx="56" cy="56" r="46" fill="#1b3022" opacity=".08"/>
    <path d="M26 68 C39 45 73 45 86 68" fill="none" stroke="#1b3022" stroke-width="6" stroke-linecap="round"/>
    <circle cx="32" cy="70" r="14" fill="none" stroke="#1b3022" stroke-width="6"/>
    <circle cx="82" cy="70" r="14" fill="none" stroke="#1b3022" stroke-width="6"/>
    <path d="M54 70 L64 48 L78 70 M54 70 L42 48" stroke="#8c7051" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
