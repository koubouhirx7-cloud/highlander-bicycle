    <script src="script.js?v=20260702-googleprofile1"></script>
    <script>
        function readOrderJson(key, fallback = null) {
            try {
                const raw = localStorage.getItem(key);
                return raw ? JSON.parse(raw) : fallback;
            } catch (error) {
                return fallback;
            }
        }

        function buildHistoryRecord(order, fallback, statusLabel) {
            const items = Array.isArray(order.items) && order.items.length ? order.items : (fallback?.items || []);
            const customer = order.customer || fallback?.customer || {};
            const amount = order.amount_total || fallback?.amount_total || items.reduce((sum, item) => {
                return sum + (Number(item.price || 0) * Number(item.quantity || 0));
            }, 0);
            return {
                order_id: order.order_id || fallback?.order_id || '',
                customer,
                items,
                amount_total: amount,
                currency: order.currency || fallback?.currency || 'jpy',
                payment_method: order.payment_method || fallback?.payment_method || 'stripe',
                payment_status: order.payment_status || fallback?.payment_status || '',
                status_label: statusLabel,
                member_uid: customer.uid || fallback?.member_uid || localStorage.getItem('auth_user_uid') || '',
                customer_email: customer.email || fallback?.customer_email || localStorage.getItem('auth_user_email') || '',
                completed_at: new Date().toISOString(),
            };
        }

        function saveOrderHistory(record) {
            if (!record.order_id) return;
            if (window.HighlanderShop?.appendOrderHistory) {
                window.HighlanderShop.appendOrderHistory(record);
                return;
            }
            const history = readOrderJson('shopOrderHistory', []);
            const list = Array.isArray(history) ? history.filter(item => item.order_id !== record.order_id) : [];
            list.unshift({ ...record, saved_at: new Date().toISOString() });
            localStorage.setItem('shopOrderHistory', JSON.stringify(list.slice(0, 12)));
        }

        function renderCompleteActions(orderId) {
            const actions = document.getElementById('order-complete-actions');
            if (!actions) return;
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            actions.style.display = 'flex';
            actions.style.justifyContent = 'center';
            actions.style.gap = '10px';
            actions.style.flexWrap = 'wrap';
            actions.style.margin = '-10px 0 30px';
            actions.innerHTML = `
                ${isLoggedIn ? '<a href="member.html" class="btn btn-outline" style="text-decoration: none;">マイページで注文控えを見る</a>' : ''}
                <a href="shop.html" class="btn btn-outline" style="text-decoration: none;">ショップへ戻る</a>
            `;
        }

        function completeLocalPayment(params, statusBox) {
            const orderId = params.get('order_id') || '';
            const pending = readOrderJson('pendingLocalOrder', {});
            const record = buildHistoryRecord({ order_id: orderId }, pending, 'PayPayデモ決済受付');
            saveOrderHistory(record);
            localStorage.removeItem('cart');
            localStorage.removeItem('pendingLocalOrder');
            statusBox.innerHTML = `
                <strong style="color: #2e7d32;">PayPayデモ決済として受付しました</strong><br>
                注文番号：${record.order_id || '確認中'}<br>
                ご注文内容を店舗側で確認し、発送または受け渡しについてご連絡します。
            `;
            renderCompleteActions(record.order_id);
        }

        async function confirmStripeOrder() {
            const params = new URLSearchParams(window.location.search);
            const sessionId = params.get('session_id') || '';
            const orderId = params.get('order_id') || '';
            const isMock = params.get('mock') === '1';
            const isLocalPayPay = params.get('local') === 'paypay';
            const statusBox = document.getElementById('order-confirmation-status');

            if (isLocalPayPay) {
                completeLocalPayment(params, statusBox);
                return;
            }

            if (!sessionId && !isMock) {
                statusBox.innerHTML = 'ご注文ページへ戻らずにこの画面を開いた場合、決済確認ができません。決済後にこの画面が表示された場合は、店舗までお問い合わせください。';
                return;
            }

            try {
                const response = await fetch('/api/confirm-checkout-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        order_id: orderId,
                        mock: isMock,
                    }),
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'confirm failed');
                }

                const order = data.order || {};
                const amount = order.amount_total ? `¥${Number(order.amount_total).toLocaleString()}` : '';
                const paidLabel = data.mock ? 'デモ決済として受付しました' : 'カード決済を確認しました';
                const pendingOrder = readOrderJson('pendingStripeOrder', {});
                const record = buildHistoryRecord(order, pendingOrder, paidLabel);
                saveOrderHistory(record);
                statusBox.innerHTML = `
                    <strong style="color: #2e7d32;">${paidLabel}</strong><br>
                    注文番号：${order.order_id || orderId || '確認中'}<br>
                    ${amount ? `お支払い金額：${amount}<br>` : ''}
                    ご注文内容を店舗側で確認し、発送または受け渡しについてご連絡します。
                `;
                localStorage.removeItem('cart');
                localStorage.removeItem('pendingStripeOrder');
                renderCompleteActions(order.order_id || orderId);
            } catch (error) {
                console.error('Order confirmation failed:', error);
                statusBox.innerHTML = `
                    <strong style="color: #c62828;">決済確認に時間がかかっています。</strong><br>
                    Stripe側で決済が完了している場合でも、店舗側の確認に少し時間がかかる場合があります。<br>
                    注文番号：${orderId || '未取得'}
                `;
                renderCompleteActions(orderId);
            }
        }
        confirmStripeOrder();
    </script>
