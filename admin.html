        .admin-login-box {

        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;

            padding-bottom: 20px;

        .stats-grid {

            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;

        .stat-card {
            background: var(--bg-light);
            padding: 20px;
            border-radius: 6px;
            border-left: 4px solid var(--secondary-color);

        .stat-card-title {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .stat-card-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
            font-family: 'Outfit', sans-serif;
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
        }

        .search-input:focus {
            border-color: var(--primary-color);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;

        .btn-csv {
            background: var(--secondary-color);
            color: white;
        }

        .btn-csv:hover {
            background: var(--primary-color);
        }

        .customer-table-wrapper {
            overflow-x: auto;
            border: 1px solid #eee;
            border-radius: 6px;
        }

        .customer-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;

        .customer-table th {
            background: var(--bg-light);
            color: #333;

            padding: 15px;
            border-bottom: 2px solid #eee;
        }

        .customer-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            color: #555;
            vertical-align: top;
        }

        .customer-table tr:hover td {
            background: #fafafa;

        .badge-mode {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
            padding: 4px 10px;

            font-size: 0.75rem;

                            </tr>

    <script src="app-config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Admin Email restriction configuration
        const ADMIN_EMAIL = 'info@high-lander2.com';

        let auth = null;
        let db = null;
        let customerData = []; // Store fetched customer list for filtering and CSV exports

        // Initialize Firebase
        const isMockMode = (typeof FIREBASE_API_KEY === 'undefined' || !FIREBASE_API_KEY || FIREBASE_API_KEY === '${FIREBASE_API_KEY}');
        
        if (!isMockMode) {
            const firebaseConfig = {
                apiKey: FIREBASE_API_KEY,
                authDomain: FIREBASE_AUTH_DOMAIN,
                projectId: FIREBASE_PROJECT_ID,
                storageBucket: FIREBASE_STORAGE_BUCKET,
                messagingSenderId: FIREBASE_MESSAGING_SENDER_ID,
                appId: FIREBASE_APP_ID
            };
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            try {
                db = getFirestore(app);
            } catch(e) {
                console.error("Firestore Init Error", e);
            }
        }

        window.handleLogout = async () => {
            if (isMockMode) {
                localStorage.setItem('adminLoggedIn', 'false');
                showLoginView();
                return;
            }
            try {
                await signOut(auth);
            } catch (e) {
                console.error("Logout Error", e);
            }
        };

        // Form Login Submit
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('login-message').style.display = 'none';
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if (isMockMode) {
                if (email === ADMIN_EMAIL && password === 'admin123') {
                    localStorage.setItem('adminLoggedIn', 'true');
                    alert('【テスト環境通知】\nFirebase設定なしのため、デモ管理者ログインに成功しました。\n(ID: info@high-lander2.com / Pass: admin123)');
                    loadDashboard();
                } else {
                    showError('ログインに失敗しました。テストID: info@high-lander2.com / パスワード: admin123 です。');
                }
                return;
            }

            if (email !== ADMIN_EMAIL) {
                showError('管理者アカウントではないため、アクセス権限がありません。');
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, password);
                // Dashboard will load automatically in AuthStateChanged
            } catch (error) {
                showError('ログインに失敗しました: IDまたはパスワードが正しくありません。');
            }
        });

        // Initialize View State
        if (isMockMode) {
            console.log("Running Admin Portal in Mock Mode (Firebase configurations missing).");
            const isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
            if (isLoggedIn) {
                loadDashboard();
            } else {
                showLoginView();
            }
        } else {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    if (user.email === ADMIN_EMAIL) {
                        document.getElementById('admin-user-display').textContent = user.email;
                        await loadDashboard();
                    } else {
                        showError('このアカウントには管理者権限がありません。アクセスを拒否しました。');
                        await signOut(auth);
                        showLoginView();
                    }
                } else {
                    showLoginView();
                }
            });
        }

        // Dashboard Data Loading
        async function loadDashboard() {
            document.getElementById('view-loading').style.display = 'block';
            document.getElementById('view-login').style.display = 'none';
            document.getElementById('view-dashboard').style.display = 'none';

            // Set Admin Email Display
            document.getElementById('admin-user-display').textContent = ADMIN_EMAIL;

            if (isMockMode) {
                document.getElementById('badge-environment').innerHTML = '<span class="badge-mode"><i class="fas fa-exclamation-triangle"></i> デモ環境（ダミーデータ表示中）</span>';
                // Load Dummy Data
                customerData = getDummyCustomers();
            } else {
                document.getElementById('badge-environment').innerHTML = '<span class="badge-mode" style="background:#e8f5e9; color:#2e7d32; border-color:#c8e6c9;"><i class="fas fa-shield-alt"></i> 本番環境（Firestore連携中）</span>';
                try {
                    customerData = await fetchFirestoreCustomers();
                } catch (e) {
                    console.error("Firestore Fetch Failed", e);
                    alert("Firestoreからの顧客情報取得に失敗しました。権限・ルールを確認してください。\nダミーデータを表示します。");
                    customerData = getDummyCustomers();
                }
            }

            renderCustomers(customerData);
            
            document.getElementById('view-loading').style.display = 'none';
            document.getElementById('view-dashboard').style.display = 'block';
        }

        // Firestore Fetching
        async function fetchFirestoreCustomers() {
            if (!db) throw new Error("Firestore is not initialized.");
            const querySnapshot = await getDocs(collection(db, "users"));
            const list = [];
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                list.push({
                    date: data.updatedAt ? formatDate(data.updatedAt) : '不明',
                    name: data.name || '名前なし',
                    email: data.email || 'メールなし',
                    phone: data.phone || '電話番号なし',
                    address: data.address || '住所登録なし'
                });
            });
            // Sort by Date descending
            return list.sort((a, b) => b.date.localeCompare(a.date));
        }

        // Render Table Rows
        function renderCustomers(list) {
            const tableBody = document.getElementById('customer-list-body');
            document.getElementById('stats-total-users').textContent = `${list.length} 名`;

            if (list.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 40px; color:#888;">該当する登録顧客がいません。</td></tr>';
                return;
            }

            tableBody.innerHTML = list.map(user => `
                <tr>
                    <td><strong>${user.date}</strong></td>
                    <td><span style="font-weight: 700; color:#333;">${user.name}</span></td>
                    <td><a href="mailto:${user.email}" style="color:var(--secondary-color);">${user.email}</a></td>
                    <td><span style="font-family:\'Outfit\',sans-serif;">${user.phone}</span></td>
                    <td style="line-height:1.6; max-width: 350px; white-space: pre-wrap;">${user.address}</td>
                </tr>
            `).join('');
        }

        // Search Filter
        document.getElementById('search-box').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (!query) {
                renderCustomers(customerData);
                return;
            }
            const filtered = customerData.filter(user => 
                user.name.toLowerCase().includes(query) ||
                user.email.toLowerCase().includes(query) ||
                user.phone.toLowerCase().includes(query) ||
                user.address.toLowerCase().includes(query)
            );
            renderCustomers(filtered);
        });

        // CSV Downloader
        window.downloadCSV = () => {
            if (customerData.length === 0) {
                alert("エクスポートするデータがありません。");
                return;
            }

            // CSV Header
            let csvContent = "\uFEFF"; // Add BOM for Excel UTF-8 support
            csvContent += "登録日時,お名前,メールアドレス,電話番号,配送先住所\r\n";

            // Add rows
            customerData.forEach(user => {
                // Escape double quotes and wrap in quotes for CSV security
                const name = `"${user.name.replace(/"/g, '""')}"`;
                const email = `"${user.email.replace(/"/g, '""')}"`;
                const phone = `"${user.phone.replace(/"/g, '""')}"`;
                const address = `"${user.address.replace(/"/g, '""')}"`;
                const date = `"${user.date.replace(/"/g, '""')}"`;

                csvContent += `${date},${name},${email},${phone},${address}\r\n`;
            });

            // Trigger download
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            
            const now = new Date();
            const dateString = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
            link.setAttribute("download", `highlander_customers_${dateString}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // UI View Toggling helper
        function showLoginView() {
            document.getElementById('view-loading').style.display = 'none';
            document.getElementById('view-dashboard').style.display = 'none';
            document.getElementById('view-login').style.display = 'block';
        }

        function showError(text) {
            const container = document.getElementById('login-message');
            container.className = 'form-message error';
            container.textContent = text;
        }

        // Date formatter
        function formatDate(isoString) {
            try {
                const d = new Date(isoString);
                return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            } catch(e) {
                return isoString;
            }
        }

        // Mock Dummy Database
        function getDummyCustomers() {
            return [
                {
                    date: "2026.06.09 14:23",
                    name: "山田 太郎",
                    email: "yamada.taro@example.com",

                    address: "兵庫県丹波篠山市味間南558-3"
                },
                {

                    name: "佐藤 恵美",
                    email: "sato.emi@example.net",
                    phone: "080-9876-5432",
                    address: "大阪府大阪市中央区大手前1-1-1"
                },
                {
                    date: "2026.06.05 10:12",
                    name: "田中 健一",
                    email: "tanaka.k@example.org",
                    phone: "090-5555-4444",
                    address: "京都府京都市中京区烏丸通二条下ル秋野々町518"
                },
                {
                    date: "2026.06.02 08:30",
                    name: "鈴木 一郎",

                    phone: "070-1111-2222",
                    address: "東京都新宿区西新宿2-8-1"
                }
            ];
        }
    </script>
