    <script src="config.js"></script>

    <script>
        async function fetchProductDetail() {
            const container = document.getElementById('shop-detail-content');
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (!productId) {
                container.innerHTML = '<div class="shop-detail-error">商品が見つかりません。</div>';
                return;
            }

            if (typeof MICROCMS_SERVICE_DOMAIN === 'undefined' || typeof MICROCMS_API_KEY === 'undefined') {
                container.innerHTML = '<div class="shop-detail-error">APIキーが設定されていません。</div>';
                return;
            }

            try {
                const response = await fetch(`https://${MICROCMS_SERVICE_DOMAIN}.microcms.io/api/v1/products/${productId}`, {
                    headers: {
                        'X-MICROCMS-API-KEY': MICROCMS_API_KEY
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const item = await response.json();
                
                const title = item.title || '商品名なし';
                document.title = `${title} | Highlander`;
                
                const priceNum = item.price || 0;
                const priceStr = item.price ? `¥${item.price.toLocaleString()}` : '価格未定';
                const imageUrl = item.image && item.image.url ? item.image.url : 'logo.png';
                const description = item.description || '説明がありません。';

                let category = 'all';
                if (item.category) {
                    if (Array.isArray(item.category)) {
                        category = item.category.length > 0 ? item.category[0] : 'all';
                    } else {
                        category = item.category;
                    }
                }

                container.innerHTML = `
                    <div class="shop-detail-container">
                        <div class="shop-detail-img">
                            <img src="${imageUrl}" alt="${title}">
                        </div>
                        <div class="shop-detail-info">
                            <div class="shop-detail-category">${String(category).toUpperCase()}</div>
                            <h1 class="shop-detail-title">${title}</h1>
                            <div class="shop-detail-price">${priceStr}</div>
                            <div class="shop-detail-desc">${description}</div>
                            <button class="add-to-cart-btn btn" data-id="${item.id}" data-name="${title}" data-price="${priceNum}">カートに入れる</button>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error('Error fetching product detail:', error);
                container.innerHTML = '<div class="shop-detail-error">商品の読み込みに失敗しました。URLが正しいか確認してください。</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', fetchProductDetail);
    </script>
