    <main class="page-content">
        <section class="page-hero">
            <h1>ご注文手続き</h1>
        </section>

        <section class="section">
            <div class="container checkout-container">
                <div class="order-summary" id="order-summary">
                    <h2>ご注文内容</h2>
                    <div id="cart-items-list">
                        <!-- Cart items will be injected here -->
                    </div>
                    <div class="summary-total">
                        <span>合計金額</span>
                        <span id="cart-total">¥0</span>
                    </div>
                </div>

                <div class="checkout-form-area">
                    <h2>お客様情報</h2>


                    <form class="checkout-form" id="checkout-form">
                        <div class="form-group">
                            <label for="name">お名前（フルネーム）</label>
                            <input type="text" id="name" required placeholder="山田 太郎">
                        </div>
                        <div class="form-group">
                            <label for="email">メールアドレス</label>
                            <input type="email" id="email" required placeholder="taro@example.com">
                        </div>
                        <div class="form-group">
                            <label for="address">配送先住所</label>
                            <textarea id="address" rows="3" required placeholder="兵庫県丹波篠山市..."></textarea>
                        </div>
                        <div class="form-group" style="margin-top: 30px;">
                            <label>お支払い方法</label>
                            <div class="payment-options" style="margin-top: 10px; padding: 15px; border: 1px solid #ddd; border-radius: 8px;">
                                <label style="display: flex; align-items: center; margin-bottom: 15px; cursor: pointer;">
                                    <input type="radio" name="payment_method" value="bank" required style="margin-right: 10px; width: auto;">
                                    銀行振込
                                </label>
                                <label style="display: flex; align-items: center; margin-bottom: 15px; cursor: pointer;">
                                    <input type="radio" name="payment_method" value="stripe" style="margin-right: 10px; width: auto;">
                                    クレジットカード決済 (Stripe)
                                </label>
                                <label style="display: flex; align-items: center; cursor: pointer;">
                                    <input type="radio" name="payment_method" value="paypay" style="margin-right: 10px; width: auto;">
                                    PayPay決済
                                </label>
                            </div>
                        </div>
                        <button type="submit" class="add-to-cart-btn" style="margin-top: 20px;">注文を確定する</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

        <footer class="site-footer">
        <div class="container" style="margin-bottom: 20px;">

            <a href="privacy.html" style="color: rgba(255,255,255,0.7); text-decoration: none; margin: 0 10px; font-size: 0.8rem;">プライバシーポリシー</a> |
            <a href="tokushoho.html" style="color: rgba(255,255,255,0.7); text-decoration: none; margin: 0 10px; font-size: 0.8rem;">特定商取引法に基づく表記</a>
        </div>
        <p>&copy; 2026 Highlander Bicycle Shop</p>
    </footer>

                <a href="tel:0795982334" class="footer-btn btn-contact">

                </a>
            </div>
            <div class="footer-btn-wrapper">

                <a href="https://lin.ee/iUseF0W" target="_blank" class="footer-btn btn-line">

            </div>
        </div>
    </div>
</body>
