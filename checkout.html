                    <div id="login-notice-box" style="background: #f4f5f7; padding: 20px; border-radius: 8px; margin-bottom: 25px; text-align: center;">
                        <p id="login-notice-text" style="font-size: 0.9rem; color: #555; margin-bottom: 15px;">会員登録をすると、住所や電話番号を保存して次回から自動入力できます。</p>

                                <i class="fas fa-user"></i> ログイン・会員登録

                        <div class="form-group">

                        <div class="form-group">

                                    銀行振込

                                <label style="display: flex; align-items: center; margin-bottom: 15px; cursor: pointer;">
                                    <input type="radio" name="payment_method" value="stripe" style="margin-right: 10px; width: auto;">
                                    クレジットカード決済 (Stripe)

    <script src="config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // Pre-fill synchronously if local markers exist (reduces visual layout shift)
        const checkLocalMarkers = () => {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            if (isLoggedIn) {
                const uid = localStorage.getItem('auth_user_uid');
                const name = localStorage.getItem('auth_user_name');
                const email = localStorage.getItem('auth_user_email');
                const phone = localStorage.getItem('user_phone_' + uid);
                const address = localStorage.getItem('user_address_' + uid);

                if (name && !document.getElementById('name').value) document.getElementById('name').value = name;
                if (email && !document.getElementById('email').value) document.getElementById('email').value = email;
                if (phone && !document.getElementById('phone').value) document.getElementById('phone').value = phone;
                if (address && !document.getElementById('address').value) document.getElementById('address').value = address;
                
                const noticeBox = document.getElementById('login-notice-box');
                if (noticeBox) {
                    noticeBox.innerHTML = `
                        <div style="font-size: 0.9rem; color: #333; display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap;">
                            <span><i class="fas fa-check-circle" style="color: #2e7d32;"></i> <strong>${name || email}</strong> さんとしてログイン中</span>
                            <a href="member.html?redirect=checkout.html" class="btn btn-outline" style="padding: 6px 12px; font-size: 0.8rem; text-decoration: none; border-color: #ccc; background: #fff;">マイページ</a>
                            <button type="button" onclick="window.handleSignOut()" class="logout-btn" style="padding: 6px 12px; font-size: 0.8rem; border: 1px solid #c62828; color: #c62828; background: transparent; cursor: pointer; border-radius: 4px;">ログアウト</button>
                        </div>
                    `;
                }
                window.currentUserUid = uid;
            }
        };
        setTimeout(checkLocalMarkers, 50);

        // Check if Firebase variables are actually set in config.js (prevents crashes before Vercel envs are added)
        if (typeof FIREBASE_API_KEY === 'undefined' || !FIREBASE_API_KEY || FIREBASE_API_KEY === '${FIREBASE_API_KEY}') {
            console.log("Firebase API Keys missing. Running in mock mode.");
            window.signInWithGoogle = () => {
                const btn = document.getElementById('google-login-btn');
                if(btn) { btn.innerHTML = '認証しています...'; btn.style.opacity = '0.7'; }
                setTimeout(() => {
                    const mockUid = 'mock_uid_123';
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('auth_user_name', 'テスト 太郎');
                    localStorage.setItem('auth_user_uid', mockUid);
                    localStorage.setItem('auth_user_email', 'test@example.com');
                    localStorage.setItem('user_phone_' + mockUid, '090-9999-8888');
                    localStorage.setItem('user_address_' + mockUid, '兵庫県丹波篠山市味間南558-3');

                    document.getElementById('name').value = 'テスト 太郎';
                    document.getElementById('email').value = 'test@example.com';
                    document.getElementById('phone').value = '090-9999-8888';
                    document.getElementById('address').value = '兵庫県丹波篠山市味間南558-3';

                    checkLocalMarkers();
                    alert('【テスト環境通知】\nFirebaseの環境変数が設定されていないため、Googleログインはモックアップ動作として機能しました。');
                }, 800);
            };
            window.handleSignOut = () => {
                localStorage.setItem('isLoggedIn', 'false');
                localStorage.removeItem('auth_user_name');
                localStorage.removeItem('auth_user_uid');
                localStorage.removeItem('auth_user_email');
                window.location.reload();
            };
        } else {
            const firebaseConfig = {
                apiKey: FIREBASE_API_KEY,
                authDomain: FIREBASE_AUTH_DOMAIN,
                projectId: FIREBASE_PROJECT_ID,
                storageBucket: FIREBASE_STORAGE_BUCKET,
                messagingSenderId: FIREBASE_MESSAGING_SENDER_ID,
                appId: FIREBASE_APP_ID
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const provider = new GoogleAuthProvider();

            window.firebaseAuth = auth;
            window.signInWithGoogle = () => {
                const btn = document.getElementById('google-login-btn');
                if(btn) { btn.innerHTML = '認証しています...'; btn.style.opacity = '0.7'; }
                
                signInWithPopup(auth, provider).then((result) => {
                    const user = result.user;
                    document.getElementById('name').value = user.displayName || '';
                    document.getElementById('email').value = user.email || '';
                    
                    const savedAddress = localStorage.getItem('user_address_' + user.uid);
                    if (savedAddress) document.getElementById('address').value = savedAddress;
                    
                    const savedPhone = localStorage.getItem('user_phone_' + user.uid);
                    if (savedPhone) document.getElementById('phone').value = savedPhone;

                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('auth_user_name', user.displayName || user.email);
                    localStorage.setItem('auth_user_uid', user.uid);
                    localStorage.setItem('auth_user_email', user.email);

                    checkLocalMarkers();
                }).catch((error) => {
                    console.error("Google Sign In Error", error);
                    if(btn) {
                        btn.innerHTML = `<img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" style="width: 16px;"> Googleでログイン`;
                        btn.style.opacity = '1';
                    }
                });
            };

            window.handleSignOut = () => {
                signOut(auth).then(() => {
                    localStorage.setItem('isLoggedIn', 'false');
                    localStorage.removeItem('auth_user_name');
                    localStorage.removeItem('auth_user_uid');
                    localStorage.removeItem('auth_user_email');
                    window.location.reload();
                });
            };

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    const nameEl = document.getElementById('name');
                    const emailEl = document.getElementById('email');
                    const phoneEl = document.getElementById('phone');
                    const addressEl = document.getElementById('address');

                    if (nameEl && !nameEl.value) nameEl.value = user.displayName || '';
                    if (emailEl && !emailEl.value) emailEl.value = user.email || '';
                    
                    const savedAddress = localStorage.getItem('user_address_' + user.uid);
                    if(savedAddress && addressEl && !addressEl.value) addressEl.value = savedAddress;
                    
                    const savedPhone = localStorage.getItem('user_phone_' + user.uid);
                    if(savedPhone && phoneEl && !phoneEl.value) phoneEl.value = savedPhone;

                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('auth_user_name', user.displayName || user.email);
                    localStorage.setItem('auth_user_uid', user.uid);
                    localStorage.setItem('auth_user_email', user.email);

                    window.currentUserUid = user.uid;
                    checkLocalMarkers();
                }
            });
        }
    </script>
